<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expediente clínico — MedicOnline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A2027;--muted:#69707A;--bg:#F3F5F8;--white:#fff;
    --border:#E4E8EE;--border-soft:rgba(26,32,39,.07);
    --red:#C0392B;--red-bg:#FBEAE8;--red-line:#F0C4BE;
    --amber:#B8860B;--amber-bg:#FAF2DA;--amber-line:#EBD9A6;
    --green:#1D9E75;--green-bg:#E4F5EE;--green-line:#B7E4D2;
    --blue:#1565C0;--blue-bg:#E7F0FB;--blue-line:#BFD8F3;
    --gray:#69707A;--gray-bg:#EEF1F5;
    --font:'DM Sans',sans-serif;--display:'DM Serif Display',serif;
    --radius:14px;--shadow:0 1px 3px rgba(26,32,39,.05),0 6px 20px rgba(26,32,39,.04);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:16px;padding:14px 24px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1.5px solid var(--border);
    color:var(--ink);font-family:var(--font);font-size:13px;font-weight:500;padding:8px 16px;border-radius:100px;cursor:pointer;transition:all .18s}
  .back-btn:hover{background:var(--blue-bg);border-color:var(--blue-line);color:var(--blue)}
  .topbar-title{font-family:var(--display);font-size:19px;letter-spacing:-.01em}
  .topbar-brand{margin-left:auto;font-family:var(--display);font-size:15px;color:var(--muted)}
  .topbar-brand em{color:var(--green);font-style:normal}

  .wrap{max-width:1040px;margin:0 auto;padding:26px 24px 80px}

  .loading,.errbox{text-align:center;padding:70px 20px;color:var(--muted);font-size:14px}
  .errbox a{color:var(--blue);font-weight:500}

  /* Patient header */
  .paciente-head{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 24px;margin-bottom:16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .avatar{width:62px;height:62px;border-radius:50%;background:var(--blue-bg);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:22px;flex-shrink:0}
  .ph-name{flex:1;min-width:180px}
  .ph-name h1{font-family:var(--display);font-size:24px;letter-spacing:-.01em;line-height:1.15}
  .ph-name .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .ph-meta{display:flex;gap:26px;flex-wrap:wrap}
  .ph-item{min-width:78px}
  .ph-item .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
  .ph-item .val{font-size:15px;font-weight:500}
  .ph-item .val.blood{color:var(--red);font-weight:600}

  /* Alertas band */
  .alertas{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .alerta{display:flex;gap:12px;align-items:flex-start;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.45}
  .alerta .ic{font-size:17px;line-height:1.3;flex-shrink:0}
  .alerta.crit{background:var(--red-bg);border:1px solid var(--red-line);color:var(--red)}
  .alerta.warn{background:var(--amber-bg);border:1px solid var(--amber-line);color:var(--amber)}
  .alerta strong{font-weight:600;color:inherit}
  .alerta .txt{color:var(--ink)}

  /* Tabs */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;
    border-bottom:1px solid var(--border);scrollbar-width:thin}
  .tab{white-space:nowrap;background:transparent;border:none;border-bottom:2.5px solid transparent;
    font-family:var(--font);font-size:14px;font-weight:500;color:var(--muted);padding:11px 16px;cursor:pointer;transition:all .18s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue)}

  .panel{display:none}
  .panel.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* Cards */
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .card-title{font-size:14px;font-weight:600}
  .card-title .dim{font-weight:400;color:var(--muted);font-size:13px;margin-left:6px}

  .grid{display:grid;gap:16px}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:820px){.grid-3{grid-template-columns:1fr}}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:100px;font-family:var(--font);
    font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--ink);transition:all .18s}
  .btn:hover{background:var(--bg)}
  .btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-blue:hover{background:#0F4E9C}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-green:hover{background:#178A65}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-danger{border-color:var(--red-line);color:var(--red);background:var(--red-bg)}
  .btn-danger:hover{background:#F7DDD9}

  /* Chips / badges */
  .chip{display:inline-flex;align-items:center;padding:3px 11px;border-radius:100px;font-size:12px;font-weight:600;line-height:1.6}
  .chip-blue{background:var(--blue-bg);color:var(--blue)}
  .chip-green{background:var(--green-bg);color:var(--green)}
  .chip-amber{background:var(--amber-bg);color:var(--amber)}
  .chip-red{background:var(--red-bg);color:var(--red)}
  .chip-gray{background:var(--gray-bg);color:var(--gray)}

  /* Lists */
  .item{border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px;background:var(--white)}
  .item:last-child{margin-bottom:0}
  .item-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .item-date{font-size:12px;color:var(--muted)}
  .item-title{font-size:15px;font-weight:600}
  .kv{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .kv b{font-weight:600;color:var(--ink)}
  .kv .k{color:var(--muted);font-weight:500}
  .kv-row{margin-bottom:3px}

  .mini{font-size:12px;color:var(--muted)}
  .divider{border:none;border-top:1px solid var(--border);margin:12px 0}

  /* Vital summary tiles */
  .vtiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .vtile{background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:12px 14px}
  .vtile .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
  .vtile .val{font-size:19px;font-weight:600}
  .vtile .unit{font-size:11px;color:var(--muted);font-weight:400;margin-left:2px}

  /* Table */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
  thead{background:var(--bg)}
  th{text-align:left;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
  td{padding:11px 14px;border-top:1px solid var(--border);font-variant-numeric:tabular-nums}
  tbody tr:hover{background:#FAFBFC}

  /* Empty states */
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
  .empty .ic{font-size:34px;margin-bottom:10px;opacity:.7}

  /* Doc list */
  .doc{display:flex;align-items:center;gap:14px;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .doc-ic{width:40px;height:40px;border-radius:10px;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .doc-body{flex:1;min-width:0}
  .doc-title{font-size:14px;font-weight:500}
  .doc-actions{display:flex;gap:8px;flex-shrink:0}

  /* Modal */
  .modal-ov{display:none;position:fixed;inset:0;background:rgba(26,32,39,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-ov.open{display:flex}
  .modal{background:var(--white);border-radius:16px;max-width:540px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.25)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 24px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white)}
  .modal-head h3{font-family:var(--display);font-size:19px}
  .modal-x{background:none;border:none;font-size:24px;line-height:1;color:var(--muted);cursor:pointer;padding:2px 6px}
  .modal-x:hover{color:var(--ink)}
  .modal-body{padding:20px 24px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:0 24px 22px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;
    font-family:var(--font);font-size:14px;color:var(--ink);background:var(--white)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.12)}
  .field textarea{resize:vertical;min-height:74px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.frow{grid-template-columns:1fr}}
  .req{color:var(--red)}

  @media(max-width:640px){
    .wrap{padding:18px 14px 60px}
    .topbar{padding:12px 14px}
    .ph-meta{gap:16px}
    .paciente-head{padding:18px}
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.href='/medico-portal.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Volver
  </button>
  <div class="topbar-title">Expediente clínico</div>
  <div class="topbar-brand">Medic<em>Online</em></div>
</div>

<main class="wrap">
  <div id="loading" class="loading">Cargando expediente…</div>
  <div id="contenido" style="display:none">

    <div id="cab-paciente"></div>
    <div id="banda-alertas"></div>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="resumen"     onclick="mostrarTab('resumen',this)">Resumen</button>
      <button class="tab"        data-tab="consultas"   onclick="mostrarTab('consultas',this)">Consultas</button>
      <button class="tab"        data-tab="tratamientos" onclick="mostrarTab('tratamientos',this)">Tratamientos</button>
      <button class="tab"        data-tab="vitales"     onclick="mostrarTab('vitales',this)">Signos vitales</button>
      <button class="tab"        data-tab="documentos"  onclick="mostrarTab('documentos',this)">Documentos</button>
    </div>

    <div class="panel active" id="tab-resumen"></div>
    <div class="panel" id="tab-consultas"></div>
    <div class="panel" id="tab-tratamientos"></div>
    <div class="panel" id="tab-vitales"></div>
    <div class="panel" id="tab-documentos"></div>

  </div>
</main>

<!-- Reusable modal -->
<div class="modal-ov" id="modal-ov">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">—</h3>
      <button class="modal-x" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
/* ===== Config & auth ===== */
const API   = '/api.php';
const TOKEN = localStorage.getItem('medico_token');
const MEDID = localStorage.getItem('medico_id') || '';
const pid   = new URLSearchParams(location.search).get('paciente');
function authHeaders(){ return {'Content-Type':'application/json','X-Medico-Token': TOKEN, 'X-Medico-Id': MEDID}; }

let EXP = null;

/* ===== Helpers ===== */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nz(v){ return (v===null||v===undefined||v==='') ? null : v; }
function fmtFecha(s){ if(!s) return '—'; return String(s).split('T')[0].split(' ')[0]; }
function calcEdad(fnac){
  if(!fnac) return '—';
  const d = new Date(String(fnac).split('T')[0]);
  if(isNaN(d.getTime())) return '—';
  const h = new Date();
  let e = h.getFullYear() - d.getFullYear();
  const m = h.getMonth() - d.getMonth();
  if(m < 0 || (m === 0 && h.getDate() < d.getDate())) e--;
  return (e >= 0 && e < 130) ? (e + ' años') : '—';
}
function iniciales(nombre){
  const p = String(nombre||'').trim().split(/\s+/);
  return ((p[0]||'')[0]||'').toUpperCase() + ((p[1]||'')[0]||'').toUpperCase() || '·';
}
function imc(peso, estatura){
  peso = parseFloat(peso); estatura = parseFloat(estatura);
  if(!peso || !estatura) return null;
  const m = estatura/100;
  return (peso/(m*m)).toFixed(1);
}
function opt(v,lbl,cur){ return `<option value="${esc(v)}"${String(cur)===String(v)?' selected':''}>${esc(lbl)}</option>`; }
function val(id){ const e=document.getElementById(id); return e ? e.value.trim() : ''; }
function rawVal(id){ const e=document.getElementById(id); return e ? e.value : ''; }

/* ===== Data load ===== */
async function cargarExpediente(){
  try{
    const res  = await fetch(`${API}?action=medico_expediente`, {method:'POST', headers: authHeaders(), body: JSON.stringify({paciente_id: pid})});
    const json = await res.json();
    if(!json.ok){
      alert(json.error || 'No se pudo cargar el expediente');
      if(res.status === 401 || res.status === 403){ location.href = '/medico-portal.html'; }
      return;
    }
    EXP = json.data || {};
    render();
  }catch(e){
    document.getElementById('loading').className = 'errbox';
    document.getElementById('loading').innerHTML = 'Error de conexión al cargar el expediente.<br><a href="/medico-portal.html">← Volver al portal</a>';
  }
}

async function postAccion(action, payload){
  try{
    const res  = await fetch(`${API}?action=${action}`, {method:'POST', headers: authHeaders(), body: JSON.stringify(payload)});
    const json = await res.json();
    if(!json.ok){
      if(res.status === 401 || res.status === 403){ alert(json.error || 'Sesión expirada'); location.href = '/medico-portal.html'; return false; }
      alert('Error: ' + (json.error || 'No se pudo completar la acción'));
      return false;
    }
    cerrarModal();
    await cargarExpediente();
    return true;
  }catch(e){ alert('Error de conexión'); return false; }
}

/* ===== Render root ===== */
function render(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('contenido').style.display = 'block';
  renderCabecera();
  renderAlertas();
  renderResumen();
  renderConsultas();
  renderTratamientos();
  renderVitales();
  renderDocumentos();
}

/* ===== 2. Patient header ===== */
function renderCabecera(){
  const p = EXP.paciente || {};
  const h = EXP.historial || {};
  const cons = EXP.consultas || [];
  const sangre = nz(h.tipo_sangre);
  const ultima = cons.length ? fmtFecha(cons[0].horario || cons[0].creado_en) : '—';
  document.getElementById('cab-paciente').innerHTML = `
    <div class="paciente-head">
      <div class="avatar">${esc(iniciales(p.nombre))}</div>
      <div class="ph-name">
        <h1>${esc(p.nombre || 'Paciente')}</h1>
        <div class="sub">${p.cedula ? 'CI ' + esc(p.cedula) + ' · ' : ''}${esc(nz(p.ciudad) || '')}${p.email ? ' · ' + esc(p.email) : ''}</div>
      </div>
      <div class="ph-meta">
        <div class="ph-item"><div class="lbl">Edad</div><div class="val">${esc(calcEdad(p.fecha_nacimiento))}</div></div>
        <div class="ph-item"><div class="lbl">Sexo</div><div class="val">${esc(nz(p.genero) || '—')}</div></div>
        <div class="ph-item"><div class="lbl">Sangre</div><div class="val blood">${esc(sangre || '—')}</div></div>
        <div class="ph-item"><div class="lbl">Teléfono</div><div class="val">${esc(nz(p.telefono) || '—')}</div></div>
        <div class="ph-item"><div class="lbl">Última consulta</div><div class="val">${esc(ultima)}</div></div>
      </div>
    </div>`;
}

/* ===== 3. Alertas band ===== */
function renderAlertas(){
  const h = EXP.historial || {};
  let html = '';
  if(nz(h.alergias)){
    html += `<div class="alerta crit"><span class="ic">⚠️</span><div><strong>Alergias:</strong> <span class="txt">${esc(h.alergias)}</span></div></div>`;
  }
  if(nz(h.enfermedades_cronicas)){
    html += `<div class="alerta warn"><span class="ic">🔶</span><div><strong>Enfermedades crónicas:</strong> <span class="txt">${esc(h.enfermedades_cronicas)}</span></div></div>`;
  }
  const band = document.getElementById('banda-alertas');
  band.innerHTML = html;
  band.className = html ? 'alertas' : '';
}

/* ===== Resumen ===== */
function renderResumen(){
  const cons = EXP.consultas || [];
  const trats = EXP.tratamientos || [];
  const vit = (EXP.vitales || [])[0] || null;

  // Diagnósticos recientes (primeros 3)
  const dx = cons.slice(0,3);
  const dxHtml = dx.length ? dx.map(c => `
    <div class="item">
      <div class="item-top">
        <span class="item-title">${esc(nz(c.diagnostico) || 'Sin diagnóstico')}</span>
        <span class="item-date">${esc(fmtFecha(c.horario || c.creado_en))}</span>
      </div>
      ${nz(c.cie10) ? `<div class="kv-row kv"><span class="k">CIE-10:</span> <b>${esc(c.cie10)}</b></div>` : ''}
      ${nz(c.medico) ? `<div class="mini">${esc(c.medico)}</div>` : ''}
    </div>`).join('') : emptyBox('🩺','Sin diagnósticos registrados');

  // Tratamientos activos
  const act = trats.filter(t => t.estado === 'activo');
  const actHtml = act.length ? act.map(t => `
    <div class="item">
      <div class="item-top">
        <span class="item-title">${esc(nz(t.medicamento) || '—')}</span>
        ${chipEstado(t.estado)}
      </div>
      <div class="kv">${[nz(t.dosis), nz(t.frecuencia), nz(t.via)].filter(Boolean).map(esc).join(' · ') || '<span class="k">Sin detalle de posología</span>'}</div>
      ${nz(t.fecha_inicio) ? `<div class="mini" style="margin-top:4px">Inicio: ${esc(fmtFecha(t.fecha_inicio))}</div>` : ''}
    </div>`).join('') : emptyBox('💊','Sin tratamientos activos');

  // Últimos signos vitales
  const b = imc(vit && vit.peso, vit && vit.estatura);
  const vitHtml = vit ? `
    <div class="vtiles">
      ${vtile('PA', (nz(vit.presion_sistolica)||'–')+'/'+(nz(vit.presion_diastolica)||'–'),'mmHg')}
      ${vtile('FC', nz(vit.frecuencia_cardiaca) || '–','lpm')}
      ${vtile('FR', nz(vit.frecuencia_respiratoria) || '–','rpm')}
      ${vtile('SatO₂', nz(vit.saturacion_o2) || '–','%')}
      ${vtile('Temp', nz(vit.temperatura) || '–','°C')}
      ${vtile('Peso', nz(vit.peso) || '–','kg')}
      ${vtile('Glucosa', nz(vit.glucosa) || '–','mg/dL')}
      ${b ? vtile('IMC', b,'kg/m²') : ''}
    </div>
    <div class="mini" style="margin-top:10px">Registrado: ${esc(fmtFecha(vit.registrado_en))}</div>
  ` : emptyBox('📈','Sin signos vitales registrados');

  document.getElementById('tab-resumen').innerHTML = `
    <div class="grid grid-3">
      <div class="card" style="margin:0"><div class="card-head"><div class="card-title">Diagnósticos recientes</div></div>${dxHtml}</div>
      <div class="card" style="margin:0"><div class="card-head"><div class="card-title">Tratamientos activos</div></div>${actHtml}</div>
      <div class="card" style="margin:0"><div class="card-head"><div class="card-title">Últimos signos vitales</div></div>${vitHtml}</div>
    </div>`;
}
function vtile(lbl,v,unit){ return `<div class="vtile"><div class="lbl">${lbl}</div><div class="val">${esc(v)}<span class="unit">${unit}</span></div></div>`; }
function emptyBox(ic,txt){ return `<div class="empty"><div class="ic">${ic}</div>${esc(txt)}</div>`; }

/* ===== Consultas ===== */
function renderConsultas(){
  const cons = EXP.consultas || [];
  const lista = cons.length ? cons.map(c => `
    <div class="item">
      <div class="item-top">
        <span class="item-title">${esc(nz(c.diagnostico) || 'Consulta')}</span>
        <span class="item-date">${esc(fmtFecha(c.horario || c.creado_en))}${nz(c.medico) ? ' · ' + esc(c.medico) : ''}</span>
      </div>
      ${nz(c.cie10)          ? `<div class="kv-row kv"><span class="k">CIE-10:</span> <b>${esc(c.cie10)}</b></div>` : ''}
      ${nz(c.indicaciones)   ? `<div class="kv-row kv"><span class="k">Indicaciones:</span> ${esc(c.indicaciones)}</div>` : ''}
      ${nz(c.plan)           ? `<div class="kv-row kv"><span class="k">Plan:</span> ${esc(c.plan)}</div>` : ''}
      ${nz(c.proximo_control)? `<div class="kv-row kv"><span class="k">Próximo control:</span> ${esc(fmtFecha(c.proximo_control))}</div>` : ''}
      ${nz(c.notas)          ? `<div class="kv-row kv"><span class="k">Notas:</span> ${esc(c.notas)}</div>` : ''}
    </div>`).join('') : emptyBox('🗒️','Sin consultas registradas');

  document.getElementById('tab-consultas').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">Historial de consultas <span class="dim">${cons.length}</span></div>
        <button class="btn btn-blue btn-sm" onclick="modalNota()">➕ Nueva nota</button>
      </div>
      ${lista}
    </div>`;
}

/* ===== Tratamientos ===== */
function renderTratamientos(){
  const trats = EXP.tratamientos || [];
  const lista = trats.length ? trats.map(t => `
    <div class="item">
      <div class="item-top">
        <span class="item-title">${esc(nz(t.medicamento) || '—')}</span>
        <span style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${chipEstado(t.estado)}
          ${chipResultado(t.resultado)}
        </span>
      </div>
      <div class="kv">${[nz(t.dosis), nz(t.frecuencia), nz(t.via), nz(t.duracion)].filter(Boolean).map(esc).join(' · ') || '<span class="k">Sin detalle</span>'}</div>
      <div class="mini" style="margin-top:5px">
        ${nz(t.fecha_inicio) ? 'Inicio: ' + esc(fmtFecha(t.fecha_inicio)) : ''}
        ${nz(t.fecha_cierre) ? ' · Cierre: ' + esc(fmtFecha(t.fecha_cierre)) : ''}
        ${nz(t.medico) ? ' · ' + esc(t.medico) : ''}
      </div>
      ${nz(t.nota_cierre) ? `<div class="kv-row kv" style="margin-top:6px"><span class="k">Nota de cierre:</span> ${esc(t.nota_cierre)}</div>` : ''}
      ${t.estado !== 'finalizado' ? `<div style="margin-top:12px"><button class="btn btn-sm" onclick="modalResultado(${Number(t.id)})">Registrar resultado</button></div>` : ''}
    </div>`).join('') : emptyBox('💊','Sin tratamientos registrados');

  document.getElementById('tab-tratamientos').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">Tratamientos <span class="dim">${trats.length}</span></div>
        <button class="btn btn-blue btn-sm" onclick="modalTratamiento()">➕ Nuevo tratamiento</button>
      </div>
      ${lista}
    </div>`;
}
function chipEstado(e){
  const m = {activo:['chip-blue','Activo'], finalizado:['chip-gray','Finalizado'], suspendido:['chip-amber','Suspendido']};
  const [cls,lbl] = m[e] || ['chip-gray', e || '—'];
  return `<span class="chip ${cls}">${esc(lbl)}</span>`;
}
function chipResultado(r){
  if(!nz(r)) return '';
  const m = {
    resolvio:['chip-green','Resolvió'], mejoro:['chip-green','Mejoró'],
    sin_cambio:['chip-amber','Sin cambio'], empeoro:['chip-red','Empeoró'],
    pendiente:['chip-gray','Pendiente']
  };
  const [cls,lbl] = m[r] || ['chip-gray', r];
  return `<span class="chip ${cls}">${esc(lbl)}</span>`;
}

/* ===== Signos vitales ===== */
function renderVitales(){
  const vit = EXP.vitales || [];
  const body = vit.length ? vit.map(v => `
    <tr>
      <td>${esc(fmtFecha(v.registrado_en))}</td>
      <td>${esc(nz(v.presion_sistolica)||'–')}/${esc(nz(v.presion_diastolica)||'–')}</td>
      <td>${esc(nz(v.frecuencia_cardiaca)||'–')}</td>
      <td>${esc(nz(v.frecuencia_respiratoria)||'–')}</td>
      <td>${esc(nz(v.saturacion_o2)||'–')}</td>
      <td>${esc(nz(v.temperatura)||'–')}</td>
      <td>${esc(nz(v.peso)||'–')}</td>
      <td>${esc(nz(v.glucosa)||'–')}</td>
    </tr>`).join('') : '';

  const tabla = vit.length ? `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Fecha</th><th>PA (mmHg)</th><th>FC</th><th>FR</th><th>SatO₂</th><th>Temp</th><th>Peso</th><th>Glucosa</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>` : emptyBox('📈','Sin registros de signos vitales');

  document.getElementById('tab-vitales').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">Signos vitales <span class="dim">${vit.length}</span></div>
        <button class="btn btn-blue btn-sm" onclick="modalVitales()">➕ Registrar</button>
      </div>
      ${tabla}
    </div>`;
}

/* ===== Documentos ===== */
function renderDocumentos(){
  const docs = EXP.documentos || [];
  const iconos = {laboratorio:'🧪', imagen:'🩻', informe:'📄', receta:'💊', otro:'📎'};
  const lista = docs.length ? docs.map(d => `
    <div class="doc">
      <div class="doc-ic">${iconos[d.tipo] || '📎'}</div>
      <div class="doc-body">
        <div class="doc-title">${esc(nz(d.titulo) || 'Documento')}</div>
        <div class="mini">${esc(nz(d.tipo) || '—')} · ${esc(fmtFecha(d.creado_en))}${nz(d.observaciones) ? ' · ' + esc(d.observaciones) : ''}</div>
      </div>
      <div class="doc-actions">
        ${nz(d.archivo) ? `<a class="btn btn-sm" href="/${esc(d.archivo)}" target="_blank" rel="noopener">Ver</a>` : ''}
        <button class="btn btn-sm btn-danger" onclick="eliminarDocumento(${Number(d.id)})">Eliminar</button>
      </div>
    </div>`).join('') : emptyBox('📁','Sin documentos cargados');

  document.getElementById('tab-documentos').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">Documentos <span class="dim">${docs.length}</span></div>
        <button class="btn btn-blue btn-sm" onclick="modalDocumento()">➕ Subir</button>
      </div>
      ${lista}
    </div>`;
}

/* ===== Tabs ===== */
function mostrarTab(name, btn){
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ===== Modal core ===== */
function abrirModal(titulo, bodyHtml, footHtml){
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-foot').innerHTML = footHtml || '';
  document.getElementById('modal-ov').classList.add('open');
}
function cerrarModal(){ document.getElementById('modal-ov').classList.remove('open'); }
document.getElementById('modal-ov').addEventListener('click', e => { if(e.target.id === 'modal-ov') cerrarModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') cerrarModal(); });

function reservasOptions(){
  const rs = EXP.reservas || [];
  if(!rs.length) return '<option value="">— Sin reservas disponibles —</option>';
  return '<option value="">— Selecciona una reserva —</option>' +
    rs.map(r => opt(r.id, `#${r.id} · ${nz(r.horario) || fmtFecha(r.creado_en)}${nz(r.estado_consulta) ? ' · ' + r.estado_consulta : ''}`, '')).join('');
}

/* ===== Modal: Nueva nota ===== */
function modalNota(){
  abrirModal('Nueva nota clínica', `
    <div class="field"><label>Reserva</label><select id="nt-reserva">${reservasOptions()}</select></div>
    <div class="field"><label>Diagnóstico</label><textarea id="nt-diag"></textarea></div>
    <div class="frow">
      <div class="field"><label>CIE-10</label><input type="text" id="nt-cie10" placeholder="Ej. J06.9"></div>
      <div class="field"><label>Próximo control</label><input type="date" id="nt-control"></div>
    </div>
    <div class="field"><label>Indicaciones</label><textarea id="nt-ind"></textarea></div>
    <div class="field"><label>Plan</label><textarea id="nt-plan"></textarea></div>
    <div class="field"><label>Notas</label><textarea id="nt-notas"></textarea></div>
  `, `<button class="btn" onclick="cerrarModal()">Cancelar</button><button class="btn btn-green" onclick="guardarNota()">Guardar nota</button>`);
}
async function guardarNota(){
  const reserva_id = val('nt-reserva');
  if(!reserva_id){ alert('Selecciona una reserva'); return; }
  await postAccion('medico_guardar_nota', {
    paciente_id: pid, reserva_id,
    diagnostico: val('nt-diag'), cie10: val('nt-cie10'),
    indicaciones: val('nt-ind'), plan: val('nt-plan'),
    proximo_control: rawVal('nt-control') || null, notas: val('nt-notas')
  });
}

/* ===== Modal: Nuevo tratamiento ===== */
function modalTratamiento(){
  abrirModal('Nuevo tratamiento', `
    <div class="field"><label>Medicamento <span class="req">*</span></label><input type="text" id="tr-med" placeholder="Ej. Amoxicilina 500 mg"></div>
    <div class="frow">
      <div class="field"><label>Dosis</label><input type="text" id="tr-dosis" placeholder="Ej. 1 tableta"></div>
      <div class="field"><label>Frecuencia</label><input type="text" id="tr-frec" placeholder="Ej. cada 8 h"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Vía</label><input type="text" id="tr-via" placeholder="Ej. oral"></div>
      <div class="field"><label>Duración</label><input type="text" id="tr-dur" placeholder="Ej. 7 días"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Fecha de inicio</label><input type="date" id="tr-inicio"></div>
      <div class="field"><label>Reserva (opcional)</label><select id="tr-reserva">${reservasOptions()}</select></div>
    </div>
  `, `<button class="btn" onclick="cerrarModal()">Cancelar</button><button class="btn btn-green" onclick="guardarTratamiento()">Crear tratamiento</button>`);
}
async function guardarTratamiento(){
  const medicamento = val('tr-med');
  if(!medicamento){ alert('El medicamento es obligatorio'); return; }
  await postAccion('medico_tratamiento_crear', {
    paciente_id: pid, medicamento,
    dosis: val('tr-dosis'), frecuencia: val('tr-frec'), via: val('tr-via'),
    duracion: val('tr-dur'), fecha_inicio: rawVal('tr-inicio') || null,
    reserva_id: val('tr-reserva') || null
  });
}

/* ===== Modal: Registrar resultado ===== */
function modalResultado(tratamientoId){
  abrirModal('Registrar resultado', `
    <div class="field"><label>Resultado</label>
      <select id="rs-resultado">
        <option value="resolvio">Resolvió</option>
        <option value="mejoro">Mejoró</option>
        <option value="sin_cambio">Sin cambio</option>
        <option value="empeoro">Empeoró</option>
      </select>
    </div>
    <div class="field"><label>Nota de cierre</label><textarea id="rs-nota" placeholder="Evolución, observaciones…"></textarea></div>
  `, `<button class="btn" onclick="cerrarModal()">Cancelar</button><button class="btn btn-green" onclick="guardarResultado(${Number(tratamientoId)})">Guardar resultado</button>`);
}
async function guardarResultado(tratamientoId){
  await postAccion('medico_tratamiento_actualizar', {
    paciente_id: pid, tratamiento_id: tratamientoId,
    estado: 'finalizado', resultado: val('rs-resultado'), nota_cierre: val('rs-nota')
  });
}

/* ===== Modal: Registrar vitales ===== */
function modalVitales(){
  abrirModal('Registrar signos vitales', `
    <div class="frow">
      <div class="field"><label>Presión sistólica</label><input type="number" id="v-sis" placeholder="mmHg"></div>
      <div class="field"><label>Presión diastólica</label><input type="number" id="v-dia" placeholder="mmHg"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Frecuencia cardíaca</label><input type="number" id="v-fc" placeholder="lpm"></div>
      <div class="field"><label>Frecuencia respiratoria</label><input type="number" id="v-fr" placeholder="rpm"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Saturación O₂</label><input type="number" id="v-sat" placeholder="%"></div>
      <div class="field"><label>Temperatura</label><input type="number" step="0.1" id="v-temp" placeholder="°C"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Peso</label><input type="number" step="0.1" id="v-peso" placeholder="kg"></div>
      <div class="field"><label>Estatura</label><input type="number" step="0.1" id="v-est" placeholder="cm"></div>
    </div>
    <div class="field"><label>Glucosa</label><input type="number" step="0.1" id="v-glu" placeholder="mg/dL"></div>
  `, `<button class="btn" onclick="cerrarModal()">Cancelar</button><button class="btn btn-green" onclick="guardarVitales()">Registrar</button>`);
}
async function guardarVitales(){
  await postAccion('medico_vitales_registrar', {
    paciente_id: pid,
    presion_sistolica: rawVal('v-sis') || null, presion_diastolica: rawVal('v-dia') || null,
    frecuencia_cardiaca: rawVal('v-fc') || null, frecuencia_respiratoria: rawVal('v-fr') || null,
    saturacion_o2: rawVal('v-sat') || null, temperatura: rawVal('v-temp') || null,
    peso: rawVal('v-peso') || null, estatura: rawVal('v-est') || null, glucosa: rawVal('v-glu') || null
  });
}

/* ===== Modal: Subir documento ===== */
function modalDocumento(){
  abrirModal('Subir documento', `
    <div class="field"><label>Tipo</label>
      <select id="doc-tipo">
        <option value="laboratorio">Laboratorio</option>
        <option value="imagen">Imagen</option>
        <option value="informe">Informe</option>
        <option value="receta">Receta</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="field"><label>Título</label><input type="text" id="doc-titulo" placeholder="Ej. Hemograma completo"></div>
    <div class="field"><label>Archivo <span class="req">*</span></label>
      <input type="file" id="doc-file" accept=".pdf,.jpg,.jpeg,.png,.webp">
      <div class="mini" style="margin-top:6px">PDF o imagen · máximo 8 MB</div>
    </div>
  `, `<button class="btn" onclick="cerrarModal()">Cancelar</button><button class="btn btn-green" id="doc-btn" onclick="subirDocumento()">Subir</button>`);
}
function subirDocumento(){
  const tipo   = val('doc-tipo');
  const titulo = val('doc-titulo');
  const input  = document.getElementById('doc-file');
  const file   = input && input.files[0];
  if(!file){ alert('Selecciona un archivo'); return; }
  if(file.size > 8*1024*1024){ alert('El archivo supera el límite de 8 MB'); return; }
  const btn = document.getElementById('doc-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Subiendo…'; }
  const reader = new FileReader();
  reader.onload = async () => {
    await postAccion('medico_documento_subir', {
      paciente_id: pid, tipo, titulo,
      archivo_base64: reader.result, mime: file.type, tamano: file.size
    });
  };
  reader.onerror = () => { alert('No se pudo leer el archivo'); if(btn){ btn.disabled = false; btn.textContent = 'Subir'; } };
  reader.readAsDataURL(file);
}

async function eliminarDocumento(id){
  if(!confirm('¿Eliminar este documento del expediente? Esta acción no se puede deshacer.')) return;
  await postAccion('medico_documento_eliminar', {paciente_id: pid, documento_id: id});
}

/* ===== Boot ===== */
if(!TOKEN || !pid){
  location.replace('/medico-portal.html');
}else{
  cargarExpediente();
}
</script>
